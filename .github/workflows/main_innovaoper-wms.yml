# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - innovaoper-WMS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check (non-blocking, technical debt)
        run: npm run check
        continue-on-error: true

      - name: Build
        run: npm run build

      - name: Stage deployment package
        run: |
          mkdir -p deploy
          cp -r dist deploy/
          cp package.json deploy/
          cp package-lock.json deploy/
          cp .npmrc deploy/ 2>/dev/null || true
          cp -r node_modules deploy/

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: deploy

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'innovaoper-WMS'
          slot-name: 'Production'
          package: .
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_E89F74C3BB8548B4BEB9682519D0F12C }}

      - name: Smoke test deployed site
        run: |
          echo "Waiting 60s for container warmup..."
          sleep 60
          for i in 1 2 3 4 5; do
            code=$(curl -s -o /dev/null -w "%{http_code}" https://innovaoper-wms.azurewebsites.net/)
            echo "Attempt $i: HTTP $code"
            if [ "$code" = "200" ] || [ "$code" = "302" ] || [ "$code" = "401" ]; then
              echo "Site responding OK"
              exit 0
            fi
            sleep 20
          done
          echo "Site did not respond with a healthy status after deploy"
          exit 1
